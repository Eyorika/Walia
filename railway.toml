[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @waliabet/shared build && pnpm --filter @waliabet/bot build"

[deploy]
startCommand = "node apps/bot/dist/index.js"
numReplicas = 1
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[services]]
name = "waliabet-bot"
