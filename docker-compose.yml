version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/waliabet
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    ports:
      - "3001:80"
    depends_on:
      - api

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    environment:
      - TELEGRAM_BOT_TOKEN=your-token
    depends_on:
      - api

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=waliabet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
